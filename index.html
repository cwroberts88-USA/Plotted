<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --page:#143331;
    --paper:#e9dcc0;
    --paper-2:#e2d3b2;
    --paper-edge:#cdb887;
    --ink:#3a3020;
    --ink-soft:#6a5a3e;
    --sepia:#9c7b45;
    --graticule:rgba(120,90,45,.28);
    --graticule-strong:rgba(120,90,45,.55);
    --brass:#bd8c39;
    --brass-deep:#9a6f29;
    --origin:#2f6f5e;
    --terminus:#9d3b2c;
    --land:#d9c089;
    --coast:rgba(116,86,42,.6);
    --good:#2f6f5e;
    --bad:#9d3b2c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(120% 90% at 50% -10%, #1c4540 0%, var(--page) 55%, #0e2421 100%);
    min-height:100dvh;
    padding-top:max(18px, env(safe-area-inset-top));
    padding-bottom:max(40px, env(safe-area-inset-bottom));
    font-family:"EB Garamond",Georgia,serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:18px 14px 40px;
    -webkit-font-smoothing:antialiased;
  }
  .table{
    width:100%;
    max-width:560px;
  }
  .card{
    background:
      radial-gradient(140% 120% at 20% 0%, var(--paper) 0%, var(--paper-2) 100%);
    border:1px solid var(--paper-edge);
    box-shadow:
      0 0 0 6px rgba(189,140,57,.0),
      0 1px 0 rgba(255,255,255,.4) inset,
      0 18px 40px -18px rgba(0,0,0,.7);
    border-radius:3px;
    padding:18px 18px 22px;
    position:relative;
  }
  .card::after{
    content:"";
    position:absolute;inset:6px;
    border:1px double var(--brass);
    opacity:.45;
    pointer-events:none;
    border-radius:2px;
  }
  /* ---------- Type ---------- */
  .eyebrow{
    font-family:"IM Fell English SC",serif;
    letter-spacing:.16em;
    text-transform:uppercase;
    font-size:.72rem;
    color:var(--sepia);
  }
  .display{
    font-family:"IM Fell English",serif;
    line-height:1.02;
  }
  .mono{font-family:"Space Mono",monospace;}

  /* ---------- Start screen ---------- */
  .hero{ text-align:center; padding:14px 4px 6px; }
  .wordmark{
    font-family:"IM Fell English",serif;
    font-size:3.4rem;
    letter-spacing:.02em;
    margin:.1em 0 .05em;
    position:relative;
  }
  .wordmark .dot{ color:var(--terminus); }
  .tagline{
    font-size:1.06rem;
    color:var(--ink-soft);
    font-style:italic;
    max-width:34ch;
    margin:8px auto 0;
    line-height:1.4;
  }
  .rule{
    height:1px;background:var(--graticule-strong);
    margin:18px 2px;border:0;
  }
  .modes{ display:flex; flex-direction:column; gap:10px; margin-top:4px; }
  .mode-btn{
    text-align:left;
    background:rgba(255,255,255,.25);
    border:1px solid var(--paper-edge);
    border-radius:2px;
    padding:12px 14px;
    cursor:pointer;
    transition:transform .12s ease, background .12s ease, border-color .12s ease;
    color:var(--ink);
  }
  .mode-btn:hover{ background:rgba(189,140,57,.14); border-color:var(--brass); transform:translateY(-1px); }
  .mode-btn .m-title{ font-family:"IM Fell English",serif; font-size:1.3rem; }
  .mode-btn .m-sub{ color:var(--ink-soft); font-size:.95rem; }
  .selected{ background:rgba(189,140,57,.2); border-color:var(--brass); }
  .lengths{ display:flex; gap:10px; }
  .len-btn{ flex:1; font-family:"Space Mono",monospace; font-weight:700; font-size:1.15rem; padding:12px; border:1px solid var(--paper-edge); border-radius:2px; background:rgba(255,255,255,.25); color:var(--ink); cursor:pointer; transition:background .12s ease, border-color .12s ease, transform .12s ease; }
  .len-btn:hover{ background:rgba(189,140,57,.14); border-color:var(--brass); transform:translateY(-1px); }
  .len-btn.selected{ background:rgba(189,140,57,.22); border-color:var(--brass); }
  .cats{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .cat-btn{ text-align:left; background:rgba(255,255,255,.25); border:1px solid var(--paper-edge); border-radius:2px; padding:9px 11px; cursor:pointer; transition:background .12s ease, border-color .12s ease, transform .12s ease; color:var(--ink); }
  .cat-btn:hover{ background:rgba(189,140,57,.14); border-color:var(--brass); transform:translateY(-1px); }
  .cat-btn.selected{ background:rgba(189,140,57,.22); border-color:var(--brass); }
  .cat-btn .c-t{ font-family:"IM Fell English",serif; font-size:1.05rem; line-height:1.08; }
  .cat-btn .c-n{ font-family:"Space Mono",monospace; font-size:.68rem; color:var(--ink-soft); margin-top:2px; }

  /* ---------- Top bar ---------- */
  .topbar{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
  .topbar .wm{ font-family:"IM Fell English",serif; font-size:1.3rem; letter-spacing:.04em; }
  .topbar .wm .dot{ color:var(--terminus); }
  .counts{ display:flex; gap:14px; align-items:baseline; }
  .count{ text-align:right; }
  .count .n{ font-family:"Space Mono",monospace; font-weight:700; font-size:1.05rem; }
  .count .l{ font-family:"IM Fell English SC",serif; font-size:.6rem; letter-spacing:.12em; color:var(--sepia); display:block; }
  .progress{ height:4px; background:rgba(120,90,45,.2); border-radius:2px; margin:12px 0 14px; overflow:hidden; }
  .progress > div{ height:100%; background:linear-gradient(90deg,var(--brass-deep),var(--brass)); width:0; transition:width .35s ease; }

  /* ---------- Map ---------- */
  .plate{
    background:
      radial-gradient(120% 140% at 30% 10%, #efe4c9 0%, #e4d4ad 90%);
    border:1px solid var(--paper-edge);
    box-shadow:0 0 0 1px rgba(255,255,255,.3) inset, 0 6px 16px -10px rgba(0,0,0,.5);
    border-radius:2px;
    padding:8px;
    position:relative;
  }
  .plate svg{ display:block; width:100%; height:auto; }
  .land{ fill:var(--land); stroke:var(--coast); stroke-width:0.35; stroke-linejoin:round; stroke-linecap:round; }

  .legend{ display:flex; gap:16px; justify-content:center; margin-top:8px; flex-wrap:wrap; }
  .legend span{ display:inline-flex; align-items:center; gap:6px; font-family:"IM Fell English SC",serif; letter-spacing:.1em; font-size:.66rem; color:var(--ink-soft); }
  .swatch{ width:11px;height:11px;border-radius:50%; box-shadow:0 0 0 2px rgba(0,0,0,.06); }
  .sw-o{ background:var(--origin); }
  .sw-t{ background:var(--terminus); }

  /* ---------- Clue panel ---------- */
  .clue{ margin-top:14px; display:flex; flex-direction:column; gap:8px; }
  .coord-row{
    display:flex; align-items:flex-start; gap:10px;
    border-left:2px solid var(--paper-edge); padding-left:10px;
  }
  .coord-row.origin{ border-color:var(--origin); }
  .coord-row.terminus{ border-color:var(--terminus); }
  .coord-row .tag{ font-family:"IM Fell English SC",serif; letter-spacing:.1em; font-size:.66rem; min-width:64px; padding-top:3px; color:var(--sepia); }
  .coord-row .val .yr{ font-family:"Space Mono",monospace; font-weight:700; font-size:1.02rem; color:var(--ink); letter-spacing:.02em; }
  .coord-row .val .place{ font-size:1.08rem; line-height:1.2; margin-top:1px; }
  .coord-row .val .nums{ font-family:"Space Mono",monospace; font-size:.82rem; color:var(--ink-soft); margin-top:2px; }

  /* ---------- Guess ---------- */
  .guess-wrap{ margin-top:16px; }
  .guess-wrap label{ display:block; }
  input[type=text]{
    width:100%; margin-top:6px;
    font-family:"EB Garamond",serif; font-size:1.1rem;
    padding:11px 12px; color:var(--ink);
    background:rgba(255,255,255,.4);
    border:1px solid var(--paper-edge); border-radius:2px;
  }
  input[type=text]:focus{ outline:2px solid var(--brass); outline-offset:1px; border-color:var(--brass); }

  .btn{
    font-family:"IM Fell English SC",serif; letter-spacing:.1em;
    font-size:.92rem; text-transform:uppercase;
    padding:12px 16px; border-radius:2px; cursor:pointer;
    border:1px solid var(--brass); background:var(--brass);
    color:#22150a; transition:transform .12s ease, background .12s ease, box-shadow .12s ease;
    width:100%; margin-top:12px;
  }
  .btn:hover{ background:var(--brass-deep); color:#f3e8cf; transform:translateY(-1px); }
  .btn.ghost{ background:transparent; color:var(--ink); }
  .btn.ghost:hover{ background:rgba(189,140,57,.14); color:var(--ink); }

  /* ---------- Reveal ---------- */
  .answer{
    margin-top:16px; padding:14px 14px 16px;
    background:rgba(255,255,255,.3);
    border:1px solid var(--paper-edge); border-radius:2px;
    animation:rise .35s ease;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .answer .name{ font-family:"IM Fell English",serif; font-size:2rem; line-height:1.05; }
  .answer .years{ font-family:"Space Mono",monospace; font-size:.86rem; color:var(--ink-soft); margin-top:2px; }
  .answer .route{ margin-top:10px; font-style:italic; color:var(--ink-soft); }
  .answer .fact{ margin-top:8px; line-height:1.45; }
  .your-guess{ margin-top:10px; font-size:.92rem; color:var(--ink-soft); }
  .your-guess b{ color:var(--ink); font-style:normal; }

  .grade{ display:flex; gap:10px; margin-top:14px; }
  .grade .btn{ margin-top:0; }
  .btn.good{ border-color:var(--good); background:transparent; color:var(--good); }
  .btn.good:hover{ background:var(--good); color:#eef5f1; }
  .btn.bad{ border-color:var(--bad); background:transparent; color:var(--bad); }
  .btn.bad:hover{ background:var(--bad); color:#f8ece8; }
  .btn.locked{ opacity:.45; pointer-events:none; }

  /* ---------- End ---------- */
  .end{ text-align:center; padding:10px 4px; }
  .end .score{ font-family:"IM Fell English",serif; font-size:4rem; line-height:1; }
  .end .score small{ font-size:1.4rem; color:var(--ink-soft); }
  .end .rank{ font-family:"IM Fell English SC",serif; letter-spacing:.12em; font-size:1.1rem; color:var(--sepia); margin-top:6px; }
  .end .blurb{ font-style:italic; color:var(--ink-soft); margin:10px auto 0; max-width:32ch; line-height:1.4; }

  .hide{ display:none !important; }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; }
  }
  @media (max-width:430px){
    .wordmark{ font-size:2.8rem; }
    .answer .name{ font-size:1.7rem; }
    .end .score{ font-size:3.2rem; }
  }
</style>

const REGIONS = [
  {t:"N. AMERICA", lon:-100, lat:48}, {t:"S. AMERICA", lon:-60, lat:-15},
  {t:"EUROPE", lon:16, lat:57}, {t:"AFRICA", lon:21, lat:2},
  {t:"ASIA", lon:95, lat:50}, {t:"OCEANIA", lon:140, lat:-25},
];
const OCEANS = [
  {t:"ATLANTIC", lon:-32, lat:22}, {t:"PACIFIC", lon:-150, lat:-2},
  {t:"PACIFIC", lon:170, lat:6}, {t:"INDIAN", lon:78, lat:-28},
];

function graticule(){
  let g = "";
  for(let lon=-150; lon<=150; lon+=30){
    const x = project(lon,0).x;
    const strong = lon===0;
    g += `<line x1="${x}" y1="0" x2="${x}" y2="${MAP_H}" stroke="${strong?'var(--graticule-strong)':'var(--graticule)'}" stroke-width="${strong?0.8:0.5}"/>`;
  }
  for(let lat=-60; lat<=60; lat+=30){
    const y = project(0,lat).y;
    const strong = lat===0;
    g += `<line x1="0" y1="${y}" x2="${MAP_W}" y2="${y}" stroke="${strong?'var(--graticule-strong)':'var(--graticule)'}" stroke-width="${strong?0.8:0.5}"/>`;
  }
  return g;
}

function compass(){
  // small compass rose, top-right of plate
  const cx=336, cy=26, r=13;
  return `<g opacity="0.7" fill="none" stroke="var(--brass-deep)" stroke-width="0.7">
    <circle cx="${cx}" cy="${cy}" r="${r}"/>
    <circle cx="${cx}" cy="${cy}" r="${r-3.5}"/>
    <path d="M${cx} ${cy-r-2} L${cx+3} ${cy} L${cx} ${cy+r+2} L${cx-3} ${cy} Z" fill="var(--brass)" stroke="none" opacity="0.85"/>
    <path d="M${cx-r-2} ${cy} L${cx} ${cy-3} L${cx+r+2} ${cy} L${cx} ${cy+3} Z" fill="var(--brass-deep)" stroke="none" opacity="0.5"/>
  </g>
  <text x="${cx}" y="${cy-r-3.5}" text-anchor="middle" font-family="'IM Fell English SC',serif" font-size="5" fill="var(--brass-deep)">N</text>`;
}

function labelLayer(){
  let s = "";
  OCEANS.forEach(o=>{
    const p = project(o.lon, o.lat);
    s += `<text x="${p.x}" y="${p.y}" text-anchor="middle" font-family="EB Garamond" font-style="italic" font-size="5.5" fill="rgba(60,95,105,.45)" letter-spacing="0.6">${o.t}</text>`;
  });
  return s;
}

function pin(p, kind){
  const color = kind==="origin" ? "var(--origin)" : "var(--terminus)";
  return `<g>
    <circle cx="${p.x}" cy="${p.y}" r="4.4" fill="${color}" opacity="0.18"/>
    <circle cx="${p.x}" cy="${p.y}" r="2.6" fill="${color}" stroke="#fff" stroke-width="0.7"/>
  </g>`;
}

function renderMap(fig){
  const o = project(fig.blo, fig.bla);
  const t = project(fig.dlo, fig.dla);
  const dist = Math.hypot(o.x-t.x, o.y-t.y);
  const same = dist < 1.2;

  let route = "";
  if(!same){
    // gentle curved rhumb line between the two points
    const mx=(o.x+t.x)/2, my=(o.y+t.y)/2;
    const nx=-(t.y-o.y), ny=(t.x-o.x);
    const nl=Math.hypot(nx,ny)||1;
    const bow=Math.min(dist*0.18, 26);
    const cx=mx+nx/nl*bow, cy=my+ny/nl*bow;
    route = `<path d="M${o.x} ${o.y} Q${cx} ${cy} ${t.x} ${t.y}" fill="none" stroke="var(--ink)" stroke-width="0.7" stroke-dasharray="2 2" opacity="0.55"/>`;
  }

  let pins;
  if(same){
    pins = `<g>
      <circle cx="${o.x}" cy="${o.y}" r="5" fill="none" stroke="var(--ink-soft)" stroke-width="0.6" opacity="0.5"/>
      ${pin(o,"origin")}
      <circle cx="${o.x}" cy="${o.y}" r="1.1" fill="var(--terminus)"/>
    </g>`;
  } else {
    pins = pin(o,"origin") + pin(t,"terminus");
  }

  return `<svg viewBox="-6 -8 372 198" role="img" aria-label="World map with birthplace and place of death marked">
    <rect x="0" y="0" width="${MAP_W}" height="${MAP_H}" fill="none"/>
    <path class="land" d="${LAND_PATH}"/>
    ${graticule()}
    ${labelLayer()}
    ${compass()}
    ${route}
    ${pins}
    <rect x="0" y="0" width="${MAP_W}" height="${MAP_H}" fill="none" stroke="var(--graticule-strong)" stroke-width="0.8"/>
  </svg>`;
}

/* --------------------- CLUE / COORD PANEL ----------------------- */
const fmt = (lat, lon) => {
  const la = `${Math.abs(lat).toFixed(2)}°${lat>=0?'N':'S'}`;
  const lo = `${Math.abs(lon).toFixed(2)}°${lon>=0?'E':'W'}`;
  return `${la}, ${lo}`;
};

function renderClue(fig){
  const showPlace = mode==="easy";
  const showYear = mode!=="hard";
  const row = (cls,tag,place,yr,lat,lon) => `
    <div class="coord-row ${cls}">
      <div class="tag">${tag}</div>
      <div class="val">
        ${showYear ? `<div class="yr">${yr}</div>` : `<div class="yr" style="opacity:.5;font-weight:400;font-style:italic;">year hidden</div>`}
        ${showPlace ? `<div class="place">${place}</div>` : `<div class="place" style="color:var(--ink-soft);font-style:italic;">undisclosed location</div>`}
        <div class="nums">${fmt(lat,lon)}</div>
      </div>
    </div>`;
  return row("origin","Born", fig.bp, yearStr(fig.by), fig.bla, fig.blo)
       + row("terminus","Died", fig.dp, yearStr(fig.dy), fig.dla, fig.dlo);
}

/* ------------------------- FLOW -------------------------------- */
const $ = id => document.getElementById(id);

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startGame(){
  const pool = poolFor(category);
  total = Math.min(QPG, pool.length);
  order = shuffle(pool).slice(0, total);
  idx = 0; score = 0;
  $("start").classList.add("hide");
  $("end").classList.add("hide");
  $("game").classList.remove("hide");
  loadQuestion();
}

function loadQuestion(){
  graded = false;
  const fig = FIGURES[order[idx]];
  $("qNum").textContent = (idx+1) + " / " + total;
  $("scoreNum").textContent = score;
  $("bar").style.width = (idx/total*100) + "%";
  $("plate").innerHTML = renderMap(fig);
  $("clue").innerHTML = renderClue(fig);
  $("guessWrap").classList.remove("hide");
  $("guess").value = "";
  $("answer").classList.add("hide");
  $("answer").innerHTML = "";
  $("guess").focus();
}

function reveal(){
  const fig = FIGURES[order[idx]];
  const typed = $("guess").value.trim();
  $("guessWrap").classList.add("hide");

  const guessLine = typed
    ? `<div class="your-guess">You answered <b>${escapeHtml(typed)}</b>.</div>` : "";

  const desc = fig.f ? fig.f : [fig.r, fig.c].filter(Boolean).join(" \u00b7 ");
  const descLine = desc ? `<div class="fact">${desc}</div>` : "";
  $("answer").innerHTML = `
    <div class="eyebrow">The figure was</div>
    <div class="name">${fig.n}</div>
    <div class="years">${lifespan(fig)}</div>
    <div class="route">${fig.bp} &nbsp;→&nbsp; ${fig.dp}</div>
    ${descLine}
    ${guessLine}
    <div class="grade">
      <button class="btn good" id="gotIt">I got it</button>
      <button class="btn bad" id="missed">Missed it</button>
    </div>
    <button class="btn ghost locked" id="nextBtn">${idx===total-1?'See your log':'Next figure'}</button>
  `;
  $("answer").classList.remove("hide");
  $("gotIt").onclick = ()=>grade(true);
  $("missed").onclick = ()=>grade(false);
  $("nextBtn").onclick = next;
}

function grade(correct){
  if(graded) return;
  graded = true;
  if(correct){ score++; $("scoreNum").textContent = score; }
  $("gotIt").classList.add("locked");
  $("missed").classList.add("locked");
  if(correct){ $("gotIt").classList.remove("good"); $("gotIt").style.background="var(--good)"; $("gotIt").style.color="#eef5f1"; }
  else { $("missed").classList.remove("bad"); $("missed").style.background="var(--bad)"; $("missed").style.color="#f8ece8"; }
  $("nextBtn").classList.remove("locked");
}

function next(){
  if(idx < total-1){ idx++; loadQuestion(); }
  else finish();
}

function finish(){
  $("game").classList.add("hide");
  $("end").classList.remove("hide");
  $("finalScore").textContent = score;
  $("finalOf").textContent = " / " + total;
  const pct = total ? score/total : 0;
  let r = RANKS[0];
  for(const cand of RANKS){ if(pct>=cand.min) r = cand; }
  $("rankTitle").textContent = r.title;
  $("rankBlurb").textContent = r.blurb;
}

function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ----------------------- WIRING -------------------------------- */
document.querySelectorAll(".mode-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".mode-btn").forEach(x=>x.classList.remove("selected"));
    btn.classList.add("selected");
    mode = btn.dataset.mode;
  });
});
function setBegin(){
  const n = Math.min(QPG, catCount(category));
  $("beginBtn").textContent = "Set sail \u2014 " + n + " figure" + (n===1?"":"s");
}
document.querySelectorAll(".len-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".len-btn").forEach(x=>x.classList.remove("selected"));
    btn.classList.add("selected");
    QPG = parseInt(btn.dataset.q,10);
    setBegin();
  });
});
(function buildCats(){
  const el = $("cats");
  CATS.forEach(c=>{
    const n = catCount(c.k);
    if(n < 1) return;
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (c.k===category?" selected":"");
    btn.dataset.cat = c.k;
    btn.innerHTML = `<div class="c-t">${c.t}</div><div class="c-n">${n} figures</div>`;
    btn.addEventListener("click", ()=>{
      document.querySelectorAll(".cat-btn").forEach(x=>x.classList.remove("selected"));
      btn.classList.add("selected");
      category = c.k;
      setBegin();
    });
    el.appendChild(btn);
  });
})();
setBegin();
$("beginBtn").addEventListener("click", startGame);
$("againBtn").addEventListener("click", ()=>{ $("end").classList.add("hide"); $("start").classList.remove("hide"); });
$("revealBtn").addEventListener("click", reveal);
$("guess").addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); reveal(); } });
</script>
</body>
</html>
